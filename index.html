<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skills Assessment</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .page-wrap { max-width: 680px; margin: 0 auto; }
  .form-header { margin-bottom: 2rem; }
  .form-header h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .form-header p { font-size: 14px; color: #5f5e5a; line-height: 1.6; }
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
  @media (max-width: 480px) { .name-row { grid-template-columns: 1fr; } }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 13px; color: #5f5e5a; }
  .field-group input { padding: 9px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a18; outline: none; }
  .field-group input:focus { border-color: #888; }
  .progress-bar-wrap { margin-bottom: 2rem; }
  .progress-label { font-size: 13px; color: #5f5e5a; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .progress-track { height: 4px; background: #e0dfd8; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #185fa5; border-radius: 2px; transition: width 0.2s; }
  .stage-block { margin-bottom: 2rem; }
  .stage-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #888780; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid #ddd; }
  .skill-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .skill-name { font-size: 14px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
  .skill-desc { font-size: 13px; color: #5f5e5a; margin-bottom: 14px; line-height: 1.5; }
  .rating-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .rating-btn { border: 0.5px solid #ddd; background: #fff; border-radius: 8px; padding: 8px 4px; cursor: pointer; text-align: center; transition: all 0.12s; }
  .rating-btn:hover { background: #f5f5f3; border-color: #bbb; }
  .rating-btn.selected { background: #e6f1fb; border-color: #378add; }
  .rating-btn .num { font-size: 16px; font-weight: 500; color: #1a1a18; display: block; }
  .rating-btn .lbl { font-size: 10px; color: #888780; display: block; margin-top: 2px; }
  .rating-btn.selected .num, .rating-btn.selected .lbl { color: #185fa5; }
  .submit-wrap { margin-top: 2rem; }
  .submit-btn { width: 100%; padding: 14px; border: 0.5px solid #bbb; background: #fff; border-radius: 8px; font-size: 15px; font-weight: 500; color: #1a1a18; cursor: pointer; transition: all 0.12s; }
  .submit-btn:hover { background: #f5f5f3; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg { font-size: 13px; color: #a32d2d; margin-top: 12px; display: none; }
  .success-state { text-align: center; padding: 4rem 1rem; background: #fff; border-radius: 12px; border: 0.5px solid #ddd; }
  .success-state h2 { font-size: 18px; font-weight: 500; margin-top: 1rem; margin-bottom: 8px; }
  .success-state p { font-size: 14px; color: #5f5e5a; }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="formWrap">
    <div class="form-header">
      <h1>Skills assessment</h1>
      <p>For each skill, select the number that best reflects your current ability today. Rate honest behavior — not potential.</p>
    </div>

    <div class="name-row">
      <div class="field-group">
        <label for="repName">Your name</label>
        <input type="text" id="repName" placeholder="First Last" />
      </div>
      <div class="field-group">
        <label for="repRole">Role / team</label>
        <input type="text" id="repRole" placeholder="e.g. BDA" />
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Progress</span><span id="progressCount">0 / 30</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div id="skillsContainer"></div>

    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitForm()">Submit assessment</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <div id="successState" class="success-state" style="display:none">
    <i class="ti ti-circle-check" style="font-size:48px; color:#3b6d11;"></i>
    <h2>Assessment submitted</h2>
    <p>Your responses have been sent. Thanks for completing the assessment.</p>
  </div>
</div>

<script>
const LABELS = ['Not yet','Emerging','Independent','Advanced','Expert'];

const SKILLS = [
  { stage:'Discover', name:'Build account & industry hypothesis', desc:'Your ability to form an educated guess about a target account\'s likely business challenges before any outreach.' },
  { stage:'Discover', name:'Initiative mapping', desc:'Your ability to identify and connect a customer\'s active priorities or strategic initiatives to what you offer.' },
  { stage:'Discover', name:'Account & stakeholder mapping', desc:'Your ability to identify who is involved in a decision, their roles, and how they influence the outcome.' },
  { stage:'Discover', name:'Research prioritization', desc:'Your ability to quickly focus on the signals that actually matter for outreach — cutting noise, not just collecting information.' },
  { stage:'Discover', name:'Why meet preparation', desc:'Your ability to turn research into a compelling, personalized reason for a prospect to agree to a meeting.' },
  { stage:'Connect', name:'Hypothesis statement delivery', desc:'Your ability to clearly communicate a relevant business issue you believe the prospect may be experiencing.' },
  { stage:'Connect', name:'Helped-others proof', desc:'Your ability to use real customer examples to build credibility and show you\'ve solved similar problems before.' },
  { stage:'Connect', name:'Ask-for-time to meet', desc:'Your ability to make a direct, confident request for a meeting without hesitation or over-explanation.' },
  { stage:'Connect', name:'Agenda setting', desc:'Your ability to open a meeting with a clear purpose, structure, and outcome so both sides know what to expect.' },
  { stage:'Connect', name:'Early conceptual buy-in', desc:'Your ability to confirm the customer understands and agrees on the big picture before going deeper into the conversation.' },
  { stage:'Align', name:'Diagnostic question sequencing', desc:'Your ability to ask questions in a logical order that moves from surface facts to problems to business impact.' },
  { stage:'Align', name:'Listening & validation language', desc:'Your ability to show the customer you heard and understood them — not just repeat what they said.' },
  { stage:'Align', name:'Problem clarification', desc:'Your ability to sharpen a vague or general problem into something specific, agreed-upon, and actionable.' },
  { stage:'Align', name:'Business impact / why change / why now', desc:'Your ability to connect a problem to real business consequences and create a sense of urgency around solving it.' },
  { stage:'Align', name:'Solution conceptual buy-in', desc:'Your ability to confirm alignment on a solution direction before investing resources in building or proposing it.' },
  { stage:'Engage', name:'Internal alignment confirmation', desc:'Your ability to ensure your internal team has a shared understanding of the opportunity, stage, and next steps.' },
  { stage:'Engage', name:'Resource orchestration', desc:'Your ability to bring in the right people — technical, commercial, operational — at the right time to support the deal.' },
  { stage:'Engage', name:'Solution design collaboration', desc:'Your ability to work with internal teams to shape a solution that directly reflects what was uncovered in discovery.' },
  { stage:'Engage', name:'Multi-threading & stakeholder engagement', desc:'Your ability to build relationships across multiple contacts in an account to reduce risk and expand influence.' },
  { stage:'Engage', name:'Risk / gap identification & action planning', desc:'Your ability to spot what\'s missing or stalled in a deal and take proactive steps before it becomes a problem.' },
  { stage:'Propose', name:'Feature-advantage-benefit messaging', desc:'Your ability to connect product features to real advantages and then tie those advantages to what the customer actually cares about.' },
  { stage:'Propose', name:'Dollarizing value / ROI framing', desc:'Your ability to express the value of your solution in business terms — dollars saved, revenue gained, or risk reduced.' },
  { stage:'Propose', name:'Recommendation confidence', desc:'Your ability to make a clear, direct recommendation and defend it with rationale when challenged.' },
  { stage:'Propose', name:'Proposal clarity & relevance', desc:'Your ability to build proposals that feel tailored — not generic — and make it easy for the buyer to see fit and value.' },
  { stage:'Propose', name:'Proposal presentation & confirmation', desc:'Your ability to walk through a proposal interactively, checking for understanding and agreement as you go.' },
  { stage:'Capture', name:'Next-step control', desc:'Your ability to leave every conversation with a clear next step, a named owner, and a committed date.' },
  { stage:'Capture', name:'Commitment ask', desc:'Your ability to ask for a decision or forward movement directly and professionally, even when it\'s uncomfortable.' },
  { stage:'Capture', name:'Objection prevention', desc:'Your ability to surface and address likely concerns early in the process so they don\'t derail the deal later.' },
  { stage:'Capture', name:'Objection handling (cushion-isolate-respond)', desc:'Your ability to respond to pushback in a structured, calm way that keeps trust and momentum intact.' },
  { stage:'Capture', name:'Recovering broken commitments', desc:'Your ability to professionally re-engage when a promised next step goes missing — without damaging the relationship.' },
];

const scores = new Array(30).fill(null);

function updateProgress() {
  const done = scores.filter(s => s !== null).length;
  document.getElementById('progressCount').textContent = done + ' / 30';
  document.getElementById('progressFill').style.width = (done / 30 * 100) + '%';
}

function buildForm() {
  const container = document.getElementById('skillsContainer');
  let currentStage = '';
  let stageDiv = null;

  SKILLS.forEach((skill, i) => {
    if (skill.stage !== currentStage) {
      currentStage = skill.stage;
      stageDiv = document.createElement('div');
      stageDiv.className = 'stage-block';
      const lbl = document.createElement('div');
      lbl.className = 'stage-label';
      lbl.textContent = currentStage;
      stageDiv.appendChild(lbl);
      container.appendChild(stageDiv);
    }

    const card = document.createElement('div');
    card.className = 'skill-card';

    const nameEl = document.createElement('div');
    nameEl.className = 'skill-name';
    nameEl.textContent = skill.name;

    const descEl = document.createElement('div');
    descEl.className = 'skill-desc';
    descEl.textContent = skill.desc;

    const row = document.createElement('div');
    row.className = 'rating-row';

    for (let r = 1; r <= 5; r++) {
      const btn = document.createElement('button');
      btn.className = 'rating-btn';
      btn.innerHTML = `<span class="num">${r}</span><span class="lbl">${LABELS[r-1]}</span>`;
      btn.onclick = function () {
        scores[i] = r;
        row.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateProgress();
      };
      row.appendChild(btn);
    }

    card.appendChild(nameEl);
    card.appendChild(descEl);
    card.appendChild(row);
    stageDiv.appendChild(card);
  });
}

async function submitForm() {
  const name = document.getElementById('repName').value.trim();
  const role = document.getElementById('repRole').value.trim();
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  if (!name) { errorEl.textContent = 'Please enter your name.'; errorEl.style.display = 'block'; return; }
  const missing = scores.filter(s => s === null).length;
  if (missing > 0) { errorEl.textContent = `Please rate all skills. ${missing} remaining.`; errorEl.style.display = 'block'; return; }

  const btn = document.querySelector('.submit-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  const stages = ['Discover','Connect','Align','Engage','Propose','Capture'];
  const stageAverages = {};
  stages.forEach(s => {
    const idxs = SKILLS.map((sk, i) => sk.stage === s ? i : -1).filter(i => i >= 0);
    stageAverages[s] = (idxs.reduce((sum, i) => sum + scores[i], 0) / idxs.length).toFixed(2);
  });
  const overall = (scores.reduce((a, b) => a + b, 0) / 30).toFixed(2);

  let body = `Skills Assessment — ${name}${role ? ' (' + role + ')' : ''}\n\nSubmitted: ${new Date().toLocaleString()}\n\n`;
  stages.forEach(s => { body += `${s} avg: ${stageAverages[s]}\n`; });
  body += `\nOverall avg: ${overall}\n\n--- Individual scores ---\n\n`;
  SKILLS.forEach((sk, i) => { body += `[${sk.stage}] ${sk.name}: ${scores[i]}\n`; });

  try {
    const payload = {
      name: name,
      role: role || '—',
      submitted: new Date().toLocaleString(),
      overall_avg: overall,
      discover_avg: stageAverages['Discover'],
      connect_avg: stageAverages['Connect'],
      align_avg: stageAverages['Align'],
      engage_avg: stageAverages['Engage'],
      propose_avg: stageAverages['Propose'],
      capture_avg: stageAverages['Capture'],
      full_results: body
    };
    const response = await fetch('https://formspree.io/f/xwvzooza', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (result.ok) {
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    } else {
      throw new Error('Formspree error');
    }
  } catch (e) {
    btn.textContent = 'Submit assessment';
    btn.disabled = false;
    errorEl.textContent = 'Something went wrong. Please try again.';
    errorEl.style.display = 'block';
  }
}

buildForm();
updateProgress();
</script>
</body>
</html>
